<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plow — Live To-Dos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --midnight:#01000A; --volt:#D5EF8A; --grove:#5e7a5e; --iris:#C4BFFF; --grove-light:#e8ede8;
  --chalk:#fafaf7; --oat:#f3f3ee; --card-border:#e5e5e0;
  --dark-bg:#111110; --dark-card:#1a1a18; --dark-border:rgba(255,255,255,0.09);
  --text-dark:#F0F0E8; --muted-dark:rgba(240,240,232,0.45);
  --success:#34c759; --danger:#ff3b30; --warning:#febc2e;
  --volt-dim:rgba(213,239,138,0.15); --volt-glow:rgba(213,239,138,0.25);
  --surface:rgba(255,255,255,0.05); --surface2:rgba(255,255,255,0.08); --border-dark2:rgba(255,255,255,0.15);
  --serif:'Instrument Serif',Georgia,serif;
  --sans:'DM Sans',system-ui,-apple-system,sans-serif;
  --mono:'DM Mono','SF Mono',Consolas,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:var(--dark-bg);
  color:var(--text-dark);
  font-family:var(--sans);
  font-weight:300;
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
/* Grain texture — non-negotiable per brand */
body::after{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:0.04;pointer-events:none;z-index:9999;
}

.wrap{max-width:1400px;margin:0 auto;padding:48px 56px 80px;position:relative;z-index:1}

/* ---------- Header ---------- */
header{
  display:flex;align-items:center;justify-content:space-between;
  gap:32px;padding-bottom:32px;
  border-bottom:1px solid var(--dark-border);flex-wrap:wrap;
}
.brand{display:flex;align-items:center;gap:20px}
.brand .mark{width:64px;height:64px;border-radius:14px;overflow:hidden;flex-shrink:0;box-shadow:0 4px 24px rgba(0,0,0,0.4)}
.brand .mark svg{display:block;width:100%;height:100%}
.brand h1{font-family:var(--serif);font-weight:400;font-size:clamp(38px,4vw,60px);letter-spacing:-0.02em;line-height:1.0;color:var(--text-dark)}
.brand h1 em{font-style:italic;color:rgba(240,240,232,0.55)}
.live-row{display:flex;align-items:center;gap:14px;margin-top:8px}
.live-pill{
  display:inline-flex;align-items:center;gap:8px;
  font-family:var(--sans);font-weight:700;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;
  color:#3D5A0A;background:rgba(213,239,138,0.25);padding:4px 12px;border-radius:100px;
}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--volt);box-shadow:0 0 8px var(--volt);animation:pulse 1.6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.35;transform:scale(0.7)}}

.clock{text-align:right}
.clock .time{font-family:var(--serif);font-weight:400;font-size:clamp(48px,5vw,76px);line-height:1.0;letter-spacing:-0.02em;color:var(--volt)}
.clock .date{font-family:var(--mono);font-weight:500;font-size:14px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted-dark);margin-top:8px}

/* ---------- Add bar ---------- */
.addbar{display:flex;gap:14px;margin:36px 0 28px}
.addbar input{
  flex:1;font-family:var(--sans);font-weight:400;font-size:22px;color:var(--text-dark);
  background:var(--surface);border:1.5px solid var(--dark-border);border-radius:14px;
  padding:18px 22px;outline:none;transition:border-color .15s,box-shadow .15s;
}
.addbar input::placeholder{color:var(--muted-dark)}
.addbar input:focus{border-color:var(--grove);box-shadow:0 0 0 3px rgba(94,122,94,0.25)}
.btn-volt{
  font-family:var(--sans);font-weight:700;font-size:18px;color:var(--midnight);
  background:var(--volt);border:none;border-radius:14px;padding:0 36px;cursor:pointer;
  transition:transform .15s,box-shadow .15s,filter .15s;white-space:nowrap;
}
.btn-volt:hover{transform:translateY(-1px);filter:brightness(1.06);box-shadow:0 4px 20px var(--volt-glow),0 0 30px var(--volt-glow)}

/* ---------- Counts ---------- */
.counts{display:flex;gap:14px;margin-bottom:24px;font-family:var(--mono);font-size:13px;letter-spacing:0.06em}
.counts span{padding:5px 14px;border-radius:100px;border:1px solid var(--dark-border)}
.counts .c-done{color:var(--success);border-color:rgba(52,199,89,0.35)}
.counts .c-pend{color:var(--warning);border-color:rgba(254,188,46,0.35)}
.counts .c-total{color:var(--muted-dark)}

/* ---------- List ---------- */
ul.todos{list-style:none;display:flex;flex-direction:column;gap:14px}
.todo{
  display:flex;align-items:center;gap:22px;
  background:var(--surface);border:1px solid var(--dark-border);border-radius:18px;
  padding:24px 26px;transition:background .15s,border-color .15s,transform .15s;
  animation:fadeUp .2s ease-out;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
.todo:hover{background:var(--surface2)}
.todo.done{opacity:0.62}

/* check toggle */
.check{
  width:42px;height:42px;flex-shrink:0;border-radius:12px;cursor:pointer;
  border:2px solid var(--border-dark2);background:transparent;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
}
.check:hover{border-color:var(--volt)}
.check svg{width:24px;height:24px;stroke:var(--midnight);stroke-width:3;fill:none;opacity:0;transform:scale(.5);transition:.2s cubic-bezier(.34,1.56,.64,1)}
.todo.done .check{background:var(--success);border-color:var(--success)}
.todo.done .check svg{opacity:1;transform:scale(1);stroke:#fff}

/* body */
.todo-body{flex:1;min-width:0}
.todo-text{
  font-family:var(--serif);font-weight:400;font-size:clamp(26px,2.4vw,38px);line-height:1.12;
  letter-spacing:-0.015em;color:var(--text-dark);cursor:text;word-break:break-word;
}
.todo.done .todo-text{text-decoration:line-through;text-decoration-color:rgba(240,240,232,0.4);color:var(--muted-dark)}
.todo-text:focus{outline:none;box-shadow:0 2px 0 var(--grove)}
.meta{display:flex;align-items:center;gap:14px;margin-top:10px;flex-wrap:wrap}
.ago{font-family:var(--mono);font-size:13px;letter-spacing:0.04em;color:var(--text-light,#999)}
.badge{font-family:var(--sans);font-weight:700;font-size:12px;letter-spacing:0.02em;border-radius:100px;padding:4px 13px;display:inline-flex;align-items:center;gap:6px}
.badge-pending{background:rgba(254,188,46,0.18);color:#FEBC2E}
.badge-done{background:rgba(52,199,89,0.16);color:#52d873}

/* right-side control cluster: reorder arrows + delete */
.ctrls{display:flex;align-items:center;gap:8px;flex-shrink:0}
.ictrl{
  width:40px;height:40px;border-radius:10px;cursor:pointer;
  background:transparent;border:1px solid var(--dark-border);color:var(--muted-dark);
  display:flex;align-items:center;justify-content:center;transition:.15s;
  font-size:20px;line-height:1;font-family:var(--sans);
}
.ictrl:hover{border-color:var(--volt);color:var(--volt);background:var(--volt-dim)}
.ictrl:disabled{opacity:0.28;cursor:default;border-color:var(--dark-border);color:var(--muted-dark);background:transparent}
.del{
  flex-shrink:0;width:40px;height:40px;border-radius:10px;cursor:pointer;
  background:transparent;border:1px solid var(--dark-border);color:var(--muted-dark);
  display:flex;align-items:center;justify-content:center;transition:.15s;font-size:20px;
}
.del:hover{border-color:var(--danger);color:var(--danger);background:rgba(255,59,48,0.08)}

/* add sub-item button */
.add-sub{
  margin-top:14px;font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:0.04em;
  color:var(--muted-dark);background:transparent;border:1px dashed var(--dark-border);
  border-radius:10px;padding:7px 14px;cursor:pointer;transition:.15s;
}
.add-sub:hover{color:var(--volt);border-color:var(--volt);background:var(--volt-dim)}

/* sub-items — indented under parent */
ul.subs{list-style:none;display:flex;flex-direction:column;gap:10px;
  margin:16px 0 4px;padding-left:26px;border-left:2px solid var(--dark-border)}
ul.subs:empty{display:none}
.sub{
  display:flex;align-items:center;gap:16px;
  background:rgba(255,255,255,0.03);border:1px solid var(--dark-border);border-radius:12px;
  padding:14px 16px;animation:fadeUp .2s ease-out;transition:background .15s;
}
.sub:hover{background:var(--surface)}
.sub.done{opacity:0.6}
.check-sm{width:30px;height:30px;border-radius:9px}
.check-sm svg{width:18px;height:18px}
.sub-body{flex:1;min-width:0}
.sub-text{
  font-family:var(--sans);font-weight:400;font-size:clamp(18px,1.5vw,22px);line-height:1.3;
  color:var(--text-dark);cursor:text;word-break:break-word;
}
.sub.done .sub-text{text-decoration:line-through;text-decoration-color:rgba(240,240,232,0.4);color:var(--muted-dark)}
.sub-text:focus{outline:none;box-shadow:0 2px 0 var(--grove)}
.sub-text:empty:before{content:attr(data-placeholder);color:var(--muted-dark)}
.sub .meta{margin-top:6px;gap:10px}
.sub .badge{font-size:11px;padding:3px 10px}
.sub .ago{font-size:12px}
.ctrls-sm .ictrl,.ctrls-sm .del{width:32px;height:32px;border-radius:9px;font-size:16px}

/* empty */
.empty{
  text-align:center;padding:80px 20px;font-family:var(--serif);font-style:italic;
  font-size:32px;color:var(--muted-dark);
}

@media(max-width:860px){
  .wrap{padding:32px 24px 60px}
  header{flex-direction:column;align-items:flex-start}
  .clock{text-align:left}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="brand">
        <div class="mark">
          <svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="500" height="500" fill="#D5EF8A"/><path d="M114.289 56.0371C153.801 47.6678 190.954 65.1695 202.051 106.978L202.059 106.97C213.194 148.965 196.53 207.831 143.554 217.898C132.387 220.024 117.326 221.371 103.146 220.258V446L54 445.953V134.874C54.5763 97.1219 77.1828 63.9005 114.289 56.0371ZM185.946 244.908V382.057C186.211 390.27 192.121 394.786 199.122 396.499L199.13 396.491C200.843 396.912 203.701 397.192 205.469 397.192H214.098V445.945H203.709C170.777 446.934 141.746 421.249 137.198 388.986C137.167 388.41 137.128 387.826 137.089 387.25C136.513 378.826 136.303 370.378 136.303 361.938V244.908H185.946ZM446.003 378.515C446.003 394.125 441.035 405.421 437.889 411.229C417.751 448.382 369.82 456.58 336.584 431.44C311.104 451.223 274.177 450.904 250.13 429.385C240.162 420.462 227.688 404.424 227.688 382.929V244.908H276.459C276.459 281.446 276.451 343.23 276.459 373.866C276.49 379.324 276.747 384.556 280.049 389.142C287.026 398.936 301.137 399.636 308.714 389.943C312.833 383.949 311.868 379.254 312.062 370.036V244.908H361.612C361.612 278.503 361.597 348.182 361.612 374.567C361.628 377.222 361.714 379.908 362.212 382.376C364.462 394.599 380.216 399.722 389.95 391.758C394.038 388.799 397.169 383.84 397.185 379.114C397.27 337.189 397.192 91.3997 397.216 54.0674H446.003V378.515ZM247.996 72.5185C286.8 40.0843 347.01 51.7862 371.571 95.6806C390.884 128.933 382.536 173.256 353.389 198.068H353.381L353.271 198.162C319 228.479 264.395 224.851 235.785 188.711C207.51 153.902 213.055 100.733 247.996 72.5185ZM133.118 101.668C118.011 101.536 108.627 110.684 104.796 124.542C103.643 128.684 103.161 132.989 103.153 137.295V173.249C111.112 174.759 119.779 175.506 127.014 174.673V174.681C145.983 172.781 157.617 157.662 157.695 135.723C157.765 116.438 148.88 101.8 133.118 101.668ZM334.582 145.174C341.972 120.79 319.958 96.6467 295.335 99.7451L295.202 99.7607C267.55 103.459 252.98 138.571 272.16 160.052C292.142 182.894 326.125 173.49 334.582 145.174Z" fill="#5E7A5E"/></svg>
        </div>
        <h1>Live <em>to&#8209;dos</em></h1>
      </div>
      <div class="live-row">
        <span class="live-pill"><span class="live-dot"></span>On air</span>
      </div>
    </div>
    <div class="clock">
      <div class="time" id="time">--:--</div>
      <div class="date" id="date">—</div>
    </div>
  </header>

  <div class="addbar">
    <input id="newItem" type="text" placeholder="Add a to-do and hit Enter…" autocomplete="off" aria-label="New to-do">
    <button class="btn-volt" id="addBtn">Add</button>
  </div>

  <div class="counts">
    <span class="c-done" id="cDone">0 done</span>
    <span class="c-pend" id="cPend">0 pending</span>
    <span class="c-total" id="cTotal">0 total</span>
  </div>

  <ul class="todos" id="list"></ul>
</div>

<script>
const KEY='plow.stream.todos.v1';
const list=document.getElementById('list');
const input=document.getElementById('newItem');

let todos=load();
save(); // persist migrated shape (adds subs[] to pre-existing items)

function load(){
  let arr=[];
  try{const raw=localStorage.getItem(KEY);arr=raw?JSON.parse(raw):[];}
  catch(e){arr=[];}
  // migration: ensure every item has a subs array; ensure subs have required fields
  if(!Array.isArray(arr))arr=[];
  for(const t of arr){
    if(!Array.isArray(t.subs))t.subs=[];
    for(const s of t.subs){
      if(s.done==null)s.done=false;
      if(s.created==null)s.created=Date.now();
      if(s.id==null)s.id=uid();
    }
  }
  return arr;
}
function save(){localStorage.setItem(KEY,JSON.stringify(todos));}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}

// id of a sub-item that should grab focus right after the next render
let focusSubId=null;

function addItem(text){
  text=(text||'').trim();
  if(!text)return;
  todos.unshift({id:uid(),text,done:false,created:Date.now(),subs:[]});
  save();render();
}

function toggle(id){
  const t=todos.find(t=>t.id===id);
  if(t){t.done=!t.done;save();render();}
}
function remove(id){
  todos=todos.filter(t=>t.id!==id);save();render();
}
function edit(id,text){
  const t=todos.find(t=>t.id===id);
  if(t){t.text=text.trim()||t.text;save();}
}

// ---- reorder (parent items) ----
function moveItem(id,dir){
  const i=todos.findIndex(t=>t.id===id);
  const j=i+dir;
  if(i<0||j<0||j>=todos.length)return;
  [todos[i],todos[j]]=[todos[j],todos[i]];
  save();render();
}

// ---- sub-items ----
function addSub(parentId,text){
  const t=todos.find(t=>t.id===parentId);
  if(!t)return;
  const sub={id:uid(),text:(text||'').trim(),done:false,created:Date.now()};
  t.subs.push(sub);
  focusSubId=sub.id;          // focus its text field after render
  save();render();
}
function toggleSub(parentId,subId){
  const t=todos.find(t=>t.id===parentId);if(!t)return;
  const s=t.subs.find(s=>s.id===subId);
  if(s){s.done=!s.done;save();render();}
}
function removeSub(parentId,subId){
  const t=todos.find(t=>t.id===parentId);if(!t)return;
  t.subs=t.subs.filter(s=>s.id!==subId);save();render();
}
function editSub(parentId,subId,text){
  const t=todos.find(t=>t.id===parentId);if(!t)return;
  const s=t.subs.find(s=>s.id===subId);if(!s)return;
  text=text.trim();
  if(!text){ // empty on blur -> drop it (keeps the list clean)
    t.subs=t.subs.filter(x=>x.id!==subId);save();render();return;
  }
  s.text=text;save();
}
function moveSub(parentId,subId,dir){
  const t=todos.find(t=>t.id===parentId);if(!t)return;
  const i=t.subs.findIndex(s=>s.id===subId);
  const j=i+dir;
  if(i<0||j<0||j>=t.subs.length)return;
  [t.subs[i],t.subs[j]]=[t.subs[j],t.subs[i]];
  save();render();
}

function ago(ts){
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<60)return 'há '+s+'s adicionado';
  const m=Math.floor(s/60);
  if(m<60)return 'há '+m+' min adicionado';
  const h=Math.floor(m/60);
  if(h<24)return 'há '+h+'h '+(m%60)+'min adicionado';
  const d=Math.floor(h/24);
  return 'há '+d+'d adicionado';
}

const CHECK_SVG='<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';

// build a status badge + "ago" meta row
function buildMeta(item){
  const meta=document.createElement('div');
  meta.className='meta';
  const badge=document.createElement('span');
  badge.className='badge '+(item.done?'badge-done':'badge-pending');
  badge.innerHTML=item.done?'✓ feito':'⏳ pendente';
  const agoEl=document.createElement('span');
  agoEl.className='ago';
  agoEl.dataset.created=item.created;
  agoEl.textContent=ago(item.created);
  meta.appendChild(badge);meta.appendChild(agoEl);
  return meta;
}
// build a ↑/↓ reorder + × delete control cluster
function buildCtrls(canUp,canDown,onUp,onDown,onDel,small){
  const c=document.createElement('div');
  c.className='ctrls'+(small?' ctrls-sm':'');
  const up=document.createElement('button');
  up.className='ictrl';up.textContent='↑';up.setAttribute('aria-label','Mover para cima');
  up.disabled=!canUp;up.onclick=onUp;
  const down=document.createElement('button');
  down.className='ictrl';down.textContent='↓';down.setAttribute('aria-label','Mover para baixo');
  down.disabled=!canDown;down.onclick=onDown;
  const del=document.createElement('button');
  del.className='del';del.textContent='×';del.setAttribute('aria-label','Remover');del.onclick=onDel;
  c.appendChild(up);c.appendChild(down);c.appendChild(del);
  return c;
}

function render(){
  // counts — include sub-items so the totals reflect everything on screen
  let total=0,done=0;
  for(const t of todos){
    total++; if(t.done)done++;
    for(const s of t.subs){total++; if(s.done)done++;}
  }
  document.getElementById('cDone').textContent=done+' done';
  document.getElementById('cPend').textContent=(total-done)+' pending';
  document.getElementById('cTotal').textContent=total+' total';

  let focusEl=null;

  if(!todos.length){
    list.innerHTML='<li class="empty">Nada ainda. Adiciona o primeiro to-do acima.</li>';
    return;
  }
  list.innerHTML='';
  todos.forEach((t,ti)=>{
    const li=document.createElement('li');
    li.className='todo'+(t.done?' done':'');
    li.dataset.id=t.id;

    const check=document.createElement('button');
    check.className='check';
    check.setAttribute('aria-label',t.done?'Marcar como pendente':'Marcar como feito');
    check.innerHTML=CHECK_SVG;
    check.onclick=()=>toggle(t.id);

    const body=document.createElement('div');
    body.className='todo-body';

    const txt=document.createElement('div');
    txt.className='todo-text';
    txt.contentEditable='true';
    txt.spellcheck=false;
    txt.textContent=t.text;
    txt.onblur=()=>{edit(t.id,txt.textContent);};
    txt.onkeydown=(e)=>{
      if(e.key==='Enter'){e.preventDefault();txt.blur();}
      else if(e.key==='Tab'&&!e.shiftKey){e.preventDefault();edit(t.id,txt.textContent);addSub(t.id,'');}
    };

    body.appendChild(txt);
    body.appendChild(buildMeta(t));

    // ---- sub-items ----
    const subUl=document.createElement('ul');
    subUl.className='subs';
    t.subs.forEach((s,si)=>{
      const sli=document.createElement('li');
      sli.className='sub'+(s.done?' done':'');

      const scheck=document.createElement('button');
      scheck.className='check check-sm';
      scheck.setAttribute('aria-label',s.done?'Marcar como pendente':'Marcar como feito');
      scheck.innerHTML=CHECK_SVG;
      scheck.onclick=()=>toggleSub(t.id,s.id);

      const sbody=document.createElement('div');
      sbody.className='sub-body';
      const stxt=document.createElement('div');
      stxt.className='sub-text';
      stxt.contentEditable='true';
      stxt.spellcheck=false;
      stxt.dataset.placeholder='sub-tarefa…';
      stxt.textContent=s.text;
      stxt.onblur=()=>{editSub(t.id,s.id,stxt.textContent);};
      stxt.onkeydown=(e)=>{if(e.key==='Enter'){e.preventDefault();stxt.blur();}};
      sbody.appendChild(stxt);
      sbody.appendChild(buildMeta(s));

      const sctrls=buildCtrls(
        si>0, si<t.subs.length-1,
        ()=>moveSub(t.id,s.id,-1), ()=>moveSub(t.id,s.id,1),
        ()=>removeSub(t.id,s.id), true
      );

      sli.appendChild(scheck);
      sli.appendChild(sbody);
      sli.appendChild(sctrls);
      subUl.appendChild(sli);

      if(s.id===focusSubId)focusEl=stxt;
    });
    body.appendChild(subUl);

    const addSubBtn=document.createElement('button');
    addSubBtn.className='add-sub';
    addSubBtn.textContent='+ sub-tarefa';
    addSubBtn.onclick=()=>addSub(t.id,'');
    body.appendChild(addSubBtn);

    const ctrls=buildCtrls(
      ti>0, ti<todos.length-1,
      ()=>moveItem(t.id,-1), ()=>moveItem(t.id,1),
      ()=>remove(t.id), false
    );

    li.appendChild(check);
    li.appendChild(body);
    li.appendChild(ctrls);
    list.appendChild(li);
  });

  // grab focus for a freshly added sub-item, place caret at end
  if(focusEl){
    focusSubId=null;
    focusEl.focus();
    const r=document.createRange();r.selectNodeContents(focusEl);r.collapse(false);
    const sel=window.getSelection();sel.removeAllRanges();sel.addRange(r);
  }
}

// refresh "ago" without re-rendering (preserves edit focus)
function tickAgo(){
  document.querySelectorAll('.ago').forEach(el=>{
    el.textContent=ago(Number(el.dataset.created));
  });
}

// clock
const MESES=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const DIAS=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
function tickClock(){
  const d=new Date();
  const hh=String(d.getHours()).padStart(2,'0');
  const mm=String(d.getMinutes()).padStart(2,'0');
  const ss=String(d.getSeconds()).padStart(2,'0');
  document.getElementById('time').textContent=hh+':'+mm+':'+ss;
  document.getElementById('date').textContent=DIAS[d.getDay()]+', '+d.getDate()+' '+MESES[d.getMonth()]+' '+d.getFullYear();
}

// events
document.getElementById('addBtn').onclick=()=>{addItem(input.value);input.value='';input.focus();};
input.addEventListener('keydown',e=>{if(e.key==='Enter'){addItem(input.value);input.value='';}});

tickClock();render();
setInterval(tickClock,1000);
setInterval(tickAgo,1000);
input.focus();
</script>
